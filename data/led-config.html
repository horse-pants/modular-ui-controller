<!DOCTYPE html>
<html>
<head>
    <title>LED Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
</head>
<body>
    <main>
        <div class="header">
            <h1>LED Configuration</h1>
            <button type="button" class="theme-toggle" onclick="toggleTheme()"></button>
        </div>

        <div class="container">
            <form action="/save-led-config" method="POST">
                <label for="num_strips">Number of Strips</label>
                <input type="number" id="num_strips" name="num_strips" min="1" max="20" required>

                <label for="leds_per_strip">LEDs per Strip</label>
                <input type="number" id="leds_per_strip" name="leds_per_strip" min="1" max="300" required>

                <p>Total LEDs: <strong id="totalLeds">0</strong></p>

                <button type="submit">Save & Restart</button>
            </form>

            <p style="margin-top: 1.5rem;">
                <a href="/">Back</a>
            </p>

            <hr style="margin: 2rem 0; border-color: #333;">

            <div style="text-align: center;">
                <h3 style="color: #f88;">Reset LED State</h3>
                <p style="font-size: 0.9rem; color: #888;">
                    Clear saved brightness, color, animation, and mode settings.<br>
                    Device will boot with default red fade-in after restart.
                </p>
                <button type="button" onclick="clearLedState()"
                        style="background: #622; border-color: #a44;">
                    Clear Saved State
                </button>
            </div>
        </div>
    </main>

    <script>
        function updateTotal() {
            const strips = parseInt(document.getElementById('num_strips').value) || 0;
            const leds = parseInt(document.getElementById('leds_per_strip').value) || 0;
            document.getElementById('totalLeds').textContent = strips * leds;
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetch('/get-led-config')
                .then(r => r.json())
                .then(data => {
                    if (data.hasLedSettings) {
                        document.getElementById('num_strips').value = data.numStrips || '';
                        document.getElementById('leds_per_strip').value = data.ledsPerStrip || '';
                        updateTotal();
                    }
                })
                .catch(console.error);
        });

        document.getElementById('num_strips').addEventListener('input', updateTotal);
        document.getElementById('leds_per_strip').addEventListener('input', updateTotal);

        function clearLedState() {
            if (confirm('Clear all saved LED state preferences?\n\nThis will reset brightness, color, animation, and mode settings. The device will show the default red fade-in on next boot.')) {
                fetch('/clear-led-state', { method: 'POST' })
                    .then(response => response.text())
                    .then(html => {
                        document.body.innerHTML = html;
                    })
                    .catch(err => {
                        alert('Error clearing state: ' + err);
                    });
            }
        }
    </script>
</body>
</html>
